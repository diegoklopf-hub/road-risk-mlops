events {
    worker_connections 1024;
}

http {
    # ------------------------------------------------------------
    # Définition de l'upstream (load balancing)
    # ------------------------------------------------------------
    upstream accidents-apis {
        server accidents-api:8000;
    }

    # ------------------------------------------------------------
    # Serveur HTTP : redirection vers HTTPS
    # ------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Redirige toutes les requêtes HTTP vers HTTPS
        return 301 https://$host$request_uri;
    }

    # ------------------------------------------------------------
    # Serveur HTTPS
    # ------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name localhost;

        # Certificats SSL
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # Sécurité TLS
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # --------------------------------------------------------
        # Reverse proxy vers l'API de prédiction
        # --------------------------------------------------------
        location /api/v1/ {
    proxy_pass http://accidents-apis;   # <-- slash final
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

    }
}
