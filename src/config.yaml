  input_data_relative_path: data/01_processed
  out_merged_data_relative_path: data/02_processed_merged

data_encodage:
  merged_data_path: data/02_processed_merged/merged_data.csv
  merged_data_encoded_path: data/02_processed_merged/merged_data_encoded.csv
