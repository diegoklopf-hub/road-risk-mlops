model_trainer:
  root_dir: models
  X_train_path: data/04_resampled/X_train.csv
  y_train_path: data/04_resampled/y_train.csv
  X_test_path: data/03_features_selected/X_test.csv
  y_test_path: data/03_features_selected/y_test.csv
  features_path: models/features.joblib
  model_path: models/best_model.joblib

model_evaluation:
  root_dir: metrics
  X_test_path: data/03_features_selected/X_test.csv
  y_test_path: data/03_features_selected/y_test.csv
  model_path: models/best_model.joblib
  metric_file_name: metrics/metrics.json
  mlflow_uri: http://mlflow_server:5000

api_inference:
